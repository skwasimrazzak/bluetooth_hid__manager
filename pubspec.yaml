name: bluetooth_hid_manager
description: "A Flutter plugin to emulate Bluetooth HID devices (keyboard, mouse, gamepad) on Android."
version: 0.0.1
homepage:

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0


flutter:

  plugin:
    platforms:
      android:
        package: com.skwasimrazzak.bluetooth_hid_manager
        pluginClass: BluetoothHidManagerPlugin
      ios:
        pluginClass: BluetoothHidManagerPlugin

